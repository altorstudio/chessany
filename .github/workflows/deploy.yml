name: Deploy to Cloudflare Pages

# Auto-deploy on every push to main (and manual runs via the Actions tab).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` runs the postinstall hook, which fetches the Stockfish binaries
      # into public/engines so the build output is complete.
      - run: npm ci

      - run: npm run build

      # Create the Pages project on first run; a no-op once it exists. Keeps the
      # pipeline self-bootstrapping so no manual dashboard/CLI step is needed.
      - name: Ensure the Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ! npx --yes wrangler@3 pages project list | grep -qw chessany; then
            npx --yes wrangler@3 pages project create chessany --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=chessany --branch=main
