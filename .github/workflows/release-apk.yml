name: Release APK

# Build the Android APK and release it. Every push to main auto-bumps the patch
# version (latest v* tag + 1), tags the commit, and attaches the APK to a GitHub
# Release. Pushing a version tag by hand still works (that exact version is
# released). Manual runs (Actions tab) build the APK and upload it as a
# downloadable artifact (chessany-dev-<sha>.apk) for testing — no tag/release.
on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

# One build per ref: rapid pushes to main cancel the superseded build; tag refs
# are unique so release builds are never cancelled.
concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # needed to create the Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the version-bump step can see the latest v* tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # The native engine + Gradle plugin require JDK 21.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK platform & build-tools (compileSdk 36)
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      # NDK for cross-compiling Stockfish. Exposes ANDROID_NDK_HOME.
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          # Download fresh each run — the local cache can restore an incomplete
          # toolchain (missing clang++), breaking the Stockfish cross-compile.
          local-cache: false

      - run: npm ci

      - run: npm run build

      # Cache the cross-compiled native lib so we don't rebuild Stockfish every
      # release — keyed on the build script + Stockfish tag.
      - name: Cache libstockfish.so
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs
          key: stockfish-arm64-sf_17.1-${{ hashFiles('scripts/build-stockfish-android.sh') }}

      - name: Build native Stockfish (if not cached)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          if [ -f android/app/src/main/jniLibs/arm64-v8a/libstockfish.so ]; then
            echo "Using cached libstockfish.so"
          else
            ABIS="arm64-v8a" bash scripts/build-stockfish-android.sh
          fi

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          # gradle.properties pins a local macOS JDK path (org.gradle.java.home);
          # drop it in CI so Gradle uses JAVA_HOME from setup-java (JDK 21).
          sed -i '/org\.gradle\.java\.home/d' android/gradle.properties
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Version + name the APK
        id: apk
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            # Hand-pushed tag: release exactly that version.
            VERSION="$GITHUB_REF_NAME"
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # Push to main: auto-bump the patch of the latest v* tag.
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            VERSION=$(echo "${LATEST:-v0.0.0}" | awk -F. '{printf "%s.%s.%d", $1, $2, $3+1}')
          else
            # Manual run: test artifact only, never tagged/released.
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          OUT="chessany-${VERSION}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.version }}-apk
          path: ${{ steps.apk.outputs.path }}

      # For main pushes, tag_name doesn't exist yet — the action creates the tag
      # at this commit along with the Release (a bot-created tag doesn't
      # re-trigger this workflow, so there's no double build).
      - name: Tag + Release with APK (tag pushes & main pushes)
        if: github.ref_type == 'tag' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.version }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
